<body>
  <div id="app"></div>

  <!-- Pre-paint theme to avoid flash -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('theme-mode') || 'system';
        var sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var resolved = saved === 'system' ? (sysDark ? 'dark' : 'light') : saved;
        document.documentElement.setAttribute('data-theme', resolved);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>

  <!-- Order matters: data → ui helpers → background → tweaks-panel → pages → app -->
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="ui.jsx"></script>
